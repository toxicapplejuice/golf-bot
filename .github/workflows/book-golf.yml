name: Book Golf Tee Times

on:
  # Every Monday at 7:55pm CT (= Tuesday 1:55am UTC during CST)
  # Starts 5min early so bot can login before 8pm release
  schedule:
    - cron: '55 1 * * 2'  # 1:55am UTC Tuesday = 7:55pm CT Monday
  
  # Manual trigger for testing
  workflow_dispatch:

jobs:
  book:
    runs-on: ubuntu-latest
    steps:
      - name: Install Fly CLI
        run: curl -L https://fly.io/install.sh | sh
      
      - name: Start booking machine
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          export PATH="$HOME/.fly/bin:$PATH"
          
          # Start the machine
          echo "Starting golf-bot-austin machine..."
          fly machine start e82d776f645578 --app golf-bot-austin
          
          echo "Machine started! Bot will login and wait for 8pm CT release."
          echo "Check logs at: https://fly.io/apps/golf-bot-austin/monitoring"
